<script type="text/x-dc" data-dc-script="" data-props="{&quot;$preview&quot;:{&quot;width&quot;:960,&quot;height&quot;:720}}">
class Component extends DCLogic {

  modules = [
    { short:'Medicina',    title:'Ingreso a Medicina',    code:'M-01', cat:'ENTRENAMIENTO',      desc:'CONEUM UNC · UNSa — banco y simulacros.', c1:'#4a93ff', c2:'#0e1f4d', spine:0x4a93ff, slug:'ingreso-medicina', available:true },
    { short:'Gendarmería', title:'Ingreso a Gendarmería', code:'G-02', cat:'EXAMEN DE INGRESO',  desc:'Preparación integral del ingreso.',        c1:'#25b587', c2:'#0c2f3a', spine:0x25b587 },
    { short:'Anatomía',    title:'Anatomía',              code:'A-03', cat:'ESTUDIO POR REGIONES',desc:'Estudio por regiones y sistemas.',         c1:'#e56a33', c2:'#361626', spine:0xe56a33 },
    { short:'Residencia',  title:'Examen de Residencia',  code:'R-04', cat:'EXAMEN ÚNICO',        desc:'Entrenamiento para el examen único.',      c1:'#9166ff', c2:'#221a4a', spine:0x9166ff },
    { short:'Histología',      title:'Histología',      code:'H-05', cat:'TEJIDOS Y MICROSCOPÍA',  desc:'Tejidos, cortes y microscopía.',        c1:'#e14d8a', c2:'#3a1226', spine:0xe14d8a },
    { short:'Embriología',     title:'Embriología',     code:'E-06', cat:'DESARROLLO',            desc:'Desarrollo desde la concepción.',       c1:'#2fb3a8', c2:'#0c2f2c', spine:0x2fb3a8 },
    { short:'Bioquímica',      title:'Bioquímica',      code:'B-07', cat:'METABOLISMO',           desc:'Rutas y metabolismo celular.',          c1:'#f0a021', c2:'#3a2a0c', spine:0xf0a021 },
    { short:'Fisiología',      title:'Fisiología',      code:'F-08', cat:'FUNCIÓN DE SISTEMAS',    desc:'Función de órganos y sistemas.',        c1:'#4a93ff', c2:'#0e1f4d', spine:0x4a93ff },
    { short:'Microbiología',   title:'Microbiología',   code:'M-09', cat:'AGENTES INFECCIOSOS',   desc:'Bacterias, virus y hongos.',            c1:'#6fbf3a', c2:'#1a2f0c', spine:0x6fbf3a },
    { short:'Inmunología',     title:'Inmunología',     code:'I-10', cat:'RESPUESTA INMUNE',      desc:'Defensas y respuesta inmune.',          c1:'#c94dff', c2:'#2a103a', spine:0xc94dff },
    { short:'Genética',        title:'Genética',        code:'G-11', cat:'HERENCIA Y ADN',        desc:'Herencia, ADN y mutaciones.',           c1:'#ff5d5d', c2:'#3a1212', spine:0xff5d5d },
    { short:'Endocrinología',  title:'Endocrinología',  code:'N-12', cat:'HORMONAS',              desc:'Glándulas y sistema hormonal.',         c1:'#f5c518', c2:'#3a300c', spine:0xf5c518 }
  ];

  // ---------- lifecycle ----------
  componentDidMount(){
    this.phase='idle'; this.selIdx=null; this.tc=0; this.hx=0; this.hy=0;
    this.setState({ phase:'idle', selIdx:null, toast:false, canScroll:false });
    // track mouse across the whole page for the skeleton head-follow
    this._pm = (e)=>{
      this.hx = (e.clientX/window.innerWidth)*2-1;
      this.hy = (e.clientY/window.innerHeight)*2-1;
    };
    window.addEventListener('pointermove', this._pm);
    // every 5 minutes the skeleton takes a walk around the desk
    this._walkTimer = setInterval(()=> this.skeletonWalk(), 2*60*1000);
    this._wait = setInterval(()=>{ if(window.THREE && this.mount){ clearInterval(this._wait); this.initThree(); } }, 40);
  }
  componentWillUnmount(){
    clearInterval(this._wait); cancelAnimationFrame(this._raf);
    clearInterval(this._walkTimer);
    window.removeEventListener('pointermove', this._pm);
    [this._t1,this._t2,this._t3].forEach(t=>t&&clearTimeout(t));
    window.removeEventListener('resize', this._onResize);
    window.removeEventListener('scroll', this._onScroll);
    if(this.renderer){ this.renderer.dispose(); if(this.canvas&&this.canvas.parentNode) this.canvas.parentNode.removeChild(this.canvas); }
  }

  // ---------- three setup ----------
  initThree(){
    const T = window.THREE;
    const W = this.mount.clientWidth || 900;

    this.scene = new T.Scene();
    this.scene.fog = new T.Fog(0x05070d, 8, 26);

    // layout grid — grows in rows toward the viewer (down) as modules are added
    const n = this.modules.length;
    this.isMobile = W < 768;                 // en mobile: menos objetos, casetes en 1-2 columnas
    this.cols = this.colsForWidth(W);
    this.rowsCount = Math.ceil(n/this.cols);
    this.colGap = 1.42; this.rowGap = this.isMobile ? 1.15 : 1.25; this.row0Z = 1.75;
    this.extraRows = Math.max(0, this.rowsCount-1);

    const H = this.frameHeight(W);
    const ex = this.extraRows;
    this.camera = new T.PerspectiveCamera(this.isMobile?52:42, W/H, 0.1, 120);
    this.lastRowZ = this.row0Z + (this.rowsCount-1)*this.rowGap;
    this.applyCameraForViewport();           // setea camTop/camBot/fov según mobile/desktop
    this.camBase = this.camTop.pos.clone();
    this.camera.position.copy(this.camBase);
    this.camLook = this.camTop.look.clone();
    this.camera.lookAt(this.camLook);
    this.scrollT = 0;
    this.setState({ canScroll: ex>0 });
    this.updateSpacer();

    this.renderer = new T.WebGLRenderer({ antialias:true, alpha:true });
    this.renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    this.renderer.setSize(W, H);
    this.renderer.setClearColor(0x000000, 0);
    this.canvas = this.renderer.domElement;
    this.canvas.style.width='100%'; this.canvas.style.height='100%'; this.canvas.style.display='block';
    this.updateTouchAction();
    this.mount.appendChild(this.canvas);
    // the fixed stage lays out after mount — size to the real viewport on next frames
    requestAnimationFrame(()=>{ this.resize(); requestAnimationFrame(()=>this.resize()); });

    // lights
    this.scene.add(new T.AmbientLight(0x2c3752, 1.0));
    const key = new T.DirectionalLight(0xcfe0ff, 1.15); key.position.set(3, 7, 5); this.scene.add(key);
    const fill = new T.DirectionalLight(0x5a86c4, 0.5); fill.position.set(-4, 3, 2); this.scene.add(fill);
    this.screenLight = new T.PointLight(0x3a86ff, 0.9, 9, 2); this.screenLight.position.set(0, 1.5, -0.4); this.scene.add(this.screenLight);

    this._labelJobs = [];
    this.buildDesk(T);
    this.buildMonitor(T);
    this.buildKeyboard(T);
    this.buildDecor(T);
    // once the wordmark fonts are ready, redraw the bottle labels so they use the right typography
    if(document.fonts && document.fonts.ready){
      Promise.all([
        document.fonts.load('96px "Great Vibes"'),
        document.fonts.load('700 60px "Playfair Display"'),
        document.fonts.load('italic 600 40px "Playfair Display"')
      ]).catch(()=>{}).then(()=> document.fonts.ready).then(()=>{
        (this._labelJobs||[]).forEach(j=>{ j.draw(); j.tex.needsUpdate=true; });
      });
    }
    this.buildTapes(T);
    this.applyDecorVisibility();             // oculta decorativos en mobile

    // interaction
    this.ray = new T.Raycaster();
    this.pointer = new T.Vector2(-2,-2);
    this.mouseN = new T.Vector2(0,0);
    this.canvas.addEventListener('pointermove', this._onMove = (e)=>this.onMove(e));
    this.canvas.addEventListener('pointerdown', this._onDown = (e)=>this.onPointerDown(e));
    this.canvas.addEventListener('pointerup', this._onUp = (e)=>this.onPointerUp(e));
    this.canvas.addEventListener('pointercancel', this._onCancel = ()=>this.cancelTouchTap());
    window.addEventListener('resize', this._onResize = ()=>this.resize());
    window.addEventListener('scroll', this._onScroll = ()=>this.onScroll(), {passive:true});
    // el módulo real (dentro del iframe del CRT) pide salir con postMessage
    window.addEventListener('message', this._onMsg = (e)=>{ if(e&&e.data&&e.data.type==='aulirex:eject') this.exit(); });
    this.onScroll();

    this.clock = new T.Clock();
    // Efectos de sonido (se desbloquean con el primer click de casete)
    this.sfx = {
      insert: new Audio('assets/sfx-insert.mp3'),
      diving: new Audio('assets/sfx-diving.mp3'),
      eject:  new Audio('assets/sfx-eject.mp3'),
    };
    Object.values(this.sfx).forEach(a=>{ a.preload='auto'; a.volume=0.7; });
    this.animate();
  }

  playSfx(k){ const a=this.sfx&&this.sfx[k]; if(!a) return; try{ a.currentTime=0; a.play().catch(()=>{}); }catch(e){} }

  mat(T, color, opts){ return new T.MeshStandardMaterial(Object.assign({ color, roughness:0.72, metalness:0.12 }, opts||{})); }

  buildDesk(T){
    // gray surface that runs off-screen at the bottom and extends further as rows are added
    const lastRowZ = this.row0Z + (this.rowsCount-1)*this.rowGap;
    const deskBack = -4.5;
    const deskFront = Math.max(20, lastRowZ + 8);
    const depth = deskFront - deskBack;
    const centerZ = (deskFront + deskBack)/2;
    const desk = new T.Mesh(new T.BoxGeometry(30, 1, depth), this.mat(T, 0x9a9a94, {roughness:0.97, metalness:0.02}));
    desk.position.set(0, -0.5, centerZ);
    this.scene.add(desk);
    // faint length grain + darkening toward the far edges

    top.rotation.x=-Math.PI/2; top.position.set(0,0.005,centerZ); this.scene.add(top);
    // back edge line where desk meets the dark

  boneMat(T){ return new T.MeshStandardMaterial({ color:0xe8e2cd, roughness:0.8, metalness:0.0, emissive:0x2a2418, emissiveIntensity:0.55 }); }

  buildSkeleton(T){
    const bone = this.boneMat(T);
    const grp = new T.Group();
    // tucked into the right background corner, angled toward the desk
    grp.position.set(3.95, -0.9, -5.0);   // lower half sinks behind the desk
    grp.rotation.y = -0.32;
    grp.scale.setScalar(0.92);

    // --- science-lab stand: heavy base on the desk + upright pole ---
    const base = new T.Mesh(new T.CylinderGeometry(0.5,0.62,0.12,28), this.mat(T,0x2c313a,{roughness:0.6}));
    base.position.set(0.3,-0.48,-0.1); grp.add(base);
    const stem = new T.Mesh(new T.CylinderGeometry(0.045,0.045,4.15,16), this.mat(T,0x565b66,{roughness:0.35,metalness:0.6}));
    stem.position.set(0.3,1.55,-0.14); grp.add(stem);
    // suspension rod down to the skull top
    const rod = new T.Mesh(new T.CylinderGeometry(0.018,0.018,0.45,10), this.mat(T,0x565b66,{metalness:0.6}));
    rod.position.set(0.06,3.45,-0.04); rod.rotation.z=-0.28; grp.add(rod);

    const Y = 0;                    // pelvis height reference (local)

    // --- pelvis (iliac wings + sacrum) ---
    const sacrum = new T.Mesh(new T.BoxGeometry(0.22,0.28,0.16), bone);
    sacrum.position.set(0,Y,-0.02); grp.add(sacrum);
    [-1,1].forEach(s=>{
      const ilium = new T.Mesh(new T.SphereGeometry(0.24,16,14), bone);
      ilium.scale.set(0.62,0.52,0.28); ilium.position.set(s*0.19,Y+0.12,0.0);
      ilium.rotation.z = s*0.75; grp.add(ilium);
    });

    // --- spine: lumbar+thoracic with a gentle S-curve ---
    const verts = 17;
    for(let i=0;i<verts;i++){
      const f = i/(verts-1);
      const r = 0.075 - f*0.02;
      const v = new T.Mesh(new T.CylinderGeometry(r,r,0.1,10), bone);
      const zc = Math.sin(f*Math.PI)*0.14 - 0.02;   // curve forward mid-back
      v.position.set(0, Y+0.22 + i*0.135, zc); grp.add(v);
    }
    const spineTopY = Y+0.22 + (verts-1)*0.135;

    // --- ribcage: tapered ovoid of curved ribs + sternum ---
    const ribGrp = new T.Group(); ribGrp.position.set(0, spineTopY-1.15, 0.04);
    const sternum = new T.Mesh(new T.BoxGeometry(0.08,0.7,0.05), bone);
    sternum.position.set(0,0.02,0.42); sternum.rotation.x=-0.12; ribGrp.add(sternum);
    const ribN=8;
    for(let i=0;i<ribN;i++){
      const f=i/(ribN-1);
      const w = 0.34 + Math.sin(f*Math.PI)*0.34;      // widest mid-cage
      const y = 0.6 - i*0.15;
      const zoff = 0.02 + Math.sin(f*Math.PI)*0.05;
      [-1,1].forEach(s=>{
        const rib = new T.Mesh(new T.TorusGeometry(w, 0.026, 8, 26, Math.PI*0.92), bone);
        rib.position.set(0, y, zoff);
        rib.rotation.y = Math.PI/2;
        rib.rotation.z = s>0 ? -0.04 : Math.PI+0.04;
        rib.scale.set(1, 0.82, 0.66);
        ribGrp.add(rib);
      });
    }
    grp.add(ribGrp);
    const shoulderY = ribGrp.position.y + 0.72;

    // --- shoulder girdle: clavicles + scapulae ---
    [-1,1].forEach(s=>{
      const clav = new T.Mesh(new T.CylinderGeometry(0.032,0.032,0.62,10), bone);
      clav.position.set(s*0.28, shoulderY, 0.28); clav.rotation.z=Math.PI/2; clav.rotation.y=s*0.5; grp.add(clav);
      const scap = new T.Mesh(new T.BoxGeometry(0.26,0.34,0.05), bone);
      scap.position.set(s*0.34, shoulderY-0.12, -0.16); scap.rotation.y=s*0.4; grp.add(scap);
    });

    // --- arms: humerus, radius+ulna, hand with fingers (hanging) ---
    [-1,1].forEach(s=>{
      const shX = s*0.5;
      const hum = new T.Mesh(new T.CylinderGeometry(0.048,0.04,1.05,12), bone);
      hum.position.set(shX+ s*0.04, shoulderY-0.55, 0.04); hum.rotation.z=s*0.05; grp.add(hum);
      const elbowY = shoulderY-1.08;
      const ulna = new T.Mesh(new T.CylinderGeometry(0.036,0.028,0.98,10), bone);
      ulna.position.set(shX+s*0.06, elbowY-0.5, 0.07); ulna.rotation.z=s*0.03; grp.add(ulna);
      const rad = new T.Mesh(new T.CylinderGeometry(0.028,0.024,0.94,10), bone);
      rad.position.set(shX+s*0.11, elbowY-0.5, 0.09); rad.rotation.z=s*0.03; grp.add(rad);
      const palm = new T.Mesh(new T.BoxGeometry(0.13,0.13,0.05), bone);
      const handY = elbowY-1.04;
      palm.position.set(shX+s*0.09, handY, 0.09); grp.add(palm);
      for(let f=0;f<4;f++){
        const fin = new T.Mesh(new T.CylinderGeometry(0.012,0.01,0.17,6), bone);
        fin.position.set(shX+s*0.09 -0.045+f*0.03, handY-0.13, 0.1); grp.add(fin);
      }
    });

    // --- cervical neck ---
    for(let i=0;i<4;i++){
      const c = new T.Mesh(new T.CylinderGeometry(0.06,0.06,0.08,10), bone);
      c.position.set(0, spineTopY + i*0.11, 0.02); grp.add(c);
    }
    const neckTop = spineTopY + 3*0.11;

    // --- HEAD PIVOT (skull tracks the mouse) ---
    const head = new T.Group();
    head.position.set(0, neckTop + 0.46, 0.08);
    head.rotation.y = 0.18;   // base gaze angled toward the desk/user
    this.skull = head;
    // cranium (rounded, taller at back)
    const cran = new T.Mesh(new T.SphereGeometry(0.5, 28, 24), bone);
    cran.scale.set(1.0, 1.14, 1.16); cran.position.set(0,0.14,-0.04); head.add(cran);
    // temporal sides / brow width
    const brow = new T.Mesh(new T.BoxGeometry(0.62,0.12,0.34), bone);
    brow.position.set(0,-0.02,0.28); brow.rotation.x=-0.1; head.add(brow);
    // zygomatic cheeks
    [-1,1].forEach(s=>{
      const zyg = new T.Mesh(new T.SphereGeometry(0.12,14,12), bone);
      zyg.scale.set(0.9,0.7,0.9); zyg.position.set(s*0.28,-0.16,0.24); head.add(zyg);
    });
    // maxilla (upper jaw)
    const maxilla = new T.Mesh(new T.BoxGeometry(0.4,0.18,0.34), bone);
    maxilla.position.set(0,-0.26,0.24); head.add(maxilla);
    // mandible (U-shaped lower jaw: front bar + two rami)
    const chin = new T.Mesh(new T.BoxGeometry(0.42,0.1,0.12), bone);
    chin.position.set(0,-0.42,0.28); head.add(chin);
    [-1,1].forEach(s=>{
      const ramus = new T.Mesh(new T.BoxGeometry(0.09,0.24,0.1), bone);
      ramus.position.set(s*0.2,-0.34,0.12); ramus.rotation.x=0.15; head.add(ramus);
    });
    // eye sockets (deep dark) + faint red glow
    this.eyeGlows=[];
    [-1,1].forEach(s=>{
      const socket = new T.Mesh(new T.SphereGeometry(0.13,18,16), new T.MeshBasicMaterial({color:0x050403}));
      socket.scale.set(1,1.1,0.8); socket.position.set(s*0.17,-0.02,0.28); head.add(socket);
      const glow = new T.Mesh(new T.SphereGeometry(0.05,14,12), new T.MeshBasicMaterial({color:0x7a1010, transparent:true, opacity:0.8}));
      glow.position.set(s*0.17,-0.02,0.26); head.add(glow); this.eyeGlows.push(glow);
    });
    // nasal aperture (inverted teardrop)
    const nose = new T.Mesh(new T.ConeGeometry(0.06,0.17,6), new T.MeshBasicMaterial({color:0x050403}));
    nose.position.set(0,-0.16,0.32); head.add(nose);
    // teeth (upper + lower rows)
    for(let i=0;i<7;i++){
      const up = new T.Mesh(new T.BoxGeometry(0.04,0.06,0.04), bone);
      up.position.set(-0.15+i*0.05,-0.36,0.34); head.add(up);
      const lo = new T.Mesh(new T.BoxGeometry(0.04,0.05,0.04), bone);
      lo.position.set(-0.15+i*0.05,-0.44,0.32); head.add(lo);
    }
    // cranial suture line
    const suture = new T.Mesh(new T.TorusGeometry(0.42,0.006,6,28,Math.PI), new T.MeshBasicMaterial({color:0xbdb59c,transparent:true,opacity:0.5}));
    suture.position.set(0,0.12,-0.04); suture.rotation.x=Math.PI/2; head.add(suture);
    grp.add(head);

    // reuse existing eerie glow only (no extra lights added)
    this.skelLight = new T.PointLight(0x88a6e0, 0.9, 11, 2);
    this.skelLight.position.set(3.6, 2.0, -4.5); this.scene.add(this.skelLight);

    this.skeleton = grp;
    this.scene.add(grp);
  }

  // red "HUMAN ORGAN FOR TRANSPLANT" transport cooler, lid open with an organ on ice
  buildCooler(T){
    const g = new T.Group();
    const red = this.mat(T, 0xd21f27, {roughness:0.42, metalness:0.05});
    const white = this.mat(T, 0xf2f4f5, {roughness:0.5});
    const steel = this.mat(T, 0xc3c9cf, {roughness:0.3, metalness:0.85});
    const W=1.5, D=1.05, H=0.86;
    // body
    const body = new T.Mesh(new T.BoxGeometry(W,H,D), red);
    body.position.y=H/2; g.add(body);
    // white top rim
    const rim = new T.Mesh(new T.BoxGeometry(W+0.04,0.14,D+0.04), white);
    rim.position.y=H-0.02; g.add(rim);
    // white inner cavity
    const inner = new T.Mesh(new T.BoxGeometry(W-0.16,0.2,D-0.16), white);
    inner.position.y=H-0.02; g.add(inner);
    // side cooling vents
    for(let i=0;i<6;i++){
      const v=new T.Mesh(new T.BoxGeometry(0.02,0.34,0.012), white);
      v.position.set(-W/2+0.001,0.34,-D/2+0.18+i*0.11); v.rotation.y=Math.PI/2; g.add(v);
    }
    // hinges
    [-1,1].forEach(s=>{ const h=new T.Mesh(new T.BoxGeometry(0.16,0.06,0.05),steel); h.position.set(s*0.42,H+0.04,-D/2); g.add(h); });
    // latches (front)
    [-1,1].forEach(s=>{ const l=new T.Mesh(new T.BoxGeometry(0.12,0.14,0.04),steel); l.position.set(s*0.42,H-0.16,D/2+0.02); g.add(l); });
    // label panel with text
    const lab = new T.Mesh(new T.PlaneGeometry(1.18,0.6), new T.MeshBasicMaterial({map:this.coolerLabel()}));
    lab.position.set(0,H*0.46,D/2+0.001); g.add(lab);

    // --- open lid (hinged back) ---
    const lid = new T.Group();
    lid.position.set(0,H,-D/2);           // pivot at back-top edge
    const lidOut = new T.Mesh(new T.BoxGeometry(W+0.04,0.12,D+0.04), red);
    lidOut.position.set(0,0.06,D/2); lid.add(lidOut);
    const lidIn = new T.Mesh(new T.BoxGeometry(W-0.1,0.04,D-0.1), white);
    lidIn.position.set(0,0.0,D/2); lid.add(lidIn);
    lid.rotation.x = -2.1;                 // opened back
    g.add(lid);

    // --- crushed ice ---
    const iceMat = new T.MeshStandardMaterial({color:0xbfe0ef, roughness:0.15, metalness:0.1, transparent:true, opacity:0.9});
    for(let i=0;i<46;i++){
      const s=0.07+Math.random()*0.06;
      const ice=new T.Mesh(new T.BoxGeometry(s,s,s), iceMat);
      ice.position.set((Math.random()-0.5)*(W-0.28), H-0.06+Math.random()*0.05, (Math.random()-0.5)*(D-0.28));
      ice.rotation.set(Math.random(),Math.random(),Math.random()); g.add(ice);
    }
    // --- organ (liver-like, glossy) ---
    const organMat = new T.MeshStandardMaterial({color:0x8f4a44, roughness:0.35, metalness:0.05});
    const organ = new T.Group(); organ.position.set(0.05,H+0.06,0.05);
    const lobe1=new T.Mesh(new T.SphereGeometry(0.34,20,16), organMat); lobe1.scale.set(1.3,0.62,0.9); organ.add(lobe1);
    const lobe2=new T.Mesh(new T.SphereGeometry(0.24,18,14), organMat); lobe2.scale.set(1.1,0.6,0.85); lobe2.position.set(-0.34,0.02,0.04); organ.add(lobe2);
    const lobe3=new T.Mesh(new T.SphereGeometry(0.18,16,12), organMat); lobe3.scale.set(1,0.6,0.8); lobe3.position.set(0.3,-0.02,-0.05); organ.add(lobe3);
    g.add(organ);

    g.position.set(-3.35, 0, -1.7);
    g.rotation.y = 0.55;
    g.scale.setScalar(0.92);
    this.scene.add(g);
  }

  coolerLabel(){
    const c=document.createElement('canvas'); c.width=512; c.height=260; const x=c.getContext('2d');
    x.fillStyle='#d21f27'; x.fillRect(0,0,512,260);
    x.strokeStyle='#fff'; x.lineWidth=10; x.strokeRect(22,22,468,216);
    x.fillStyle='#fff'; x.textAlign='center'; x.font='900 74px Arial';
    x.fillText('HUMAN', 256, 104); x.fillText('ORGAN', 256, 178);
    x.font='900 40px Arial'; x.fillText('FOR TRANSPLANT', 256, 222);
    const t=new window.THREE.CanvasTexture(c); t.anisotropy=8; return t;
  }

  // realistic stethoscope laid flat on the desk, clear recognizable silhouette
  buildStethoscope(T){
    const g = new T.Group();
    const tubeMat = new T.MeshStandardMaterial({color:0x155066, roughness:0.35, metalness:0.15});
    const chrome  = new T.MeshStandardMaterial({color:0xd8b48a, roughness:0.2, metalness:0.9}); // rose-gold binaural
    const V = (x,z)=> new T.Vector3(x,0.05,z);
    const tube = (curve,r,mat,seg)=> g.add(new T.Mesh(new T.TubeGeometry(curve,seg||60,r,12), mat));

    // junction where the two ear tubes meet the main tube
    const J = V(0,-0.34);
    // --- binaural ear tubes (rose-gold), tips at the top, converging to J ---
    [-1,1].forEach(s=>{
      const arc = new T.CatmullRomCurve3([ V(s*0.34,-1.05), V(s*0.32,-0.78), V(s*0.24,-0.5), J ]);
      tube(arc, 0.028, chrome, 46);
      // black ear tip
      const tip=new T.Mesh(new T.SphereGeometry(0.05,14,12), this.mat(T,0x111114,{roughness:0.5}));
      tip.position.copy(V(s*0.34,-1.10)); g.add(tip);
    });

    // --- main flexible tube: one long S from J down to the chestpiece ---
    const main = new T.CatmullRomCurve3([
      J, V(0.30,-0.12), V(0.44,0.20), V(0.30,0.48), V(-0.02,0.56), V(-0.30,0.44)
    ]);
    tube(main, 0.045, tubeMat, 110);

    // --- chestpiece (iridescent chrome), lying flat, face up ---
    const cp = new T.Group(); cp.position.copy(V(-0.30,0.44));
    const irid = new T.MeshStandardMaterial({color:0x9a7fb0, roughness:0.12, metalness:1.0});
    const drum = new T.Mesh(new T.CylinderGeometry(0.19,0.19,0.07,36), irid); cp.add(drum);
    const diaph = new T.Mesh(new T.CylinderGeometry(0.175,0.175,0.012,36), new T.MeshStandardMaterial({color:0xe8e8ec, roughness:0.25, metalness:0.4}));
    diaph.position.y=0.045; cp.add(diaph);
    const stem = new T.Mesh(new T.CylinderGeometry(0.038,0.038,0.13,12), chrome);
    stem.rotation.z=Math.PI/2; stem.rotation.y=0.5; stem.position.set(0.13,0.0,0.04); cp.add(stem);
    g.add(cp);

    g.position.set(-2.4, 0, -0.5);
    g.rotation.y = -0.3;
    g.scale.setScalar(1.0);
    this.scene.add(g);
  }

  radiusAt(profile, y){
    for(let i=0;i<profile.length-1;i++){
      const a=profile[i], b=profile[i+1];
      if(y>=a[0] && y<=b[0]){ const t=(y-a[0])/((b[0]-a[0])||1); return a[1]+(b[1]-a[1])*t; }
    }
    return profile[profile.length-1][1];
  }

  buildBottle(T, profile, o){
    const g = new T.Group();
    const pts = profile.map(p=> new T.Vector2(p[1], p[0]));
    const glassMat = new T.MeshStandardMaterial({ color:o.glass, roughness:0.1, metalness:0.0,
      transparent:true, opacity:o.opacity });
    const body = new T.Mesh(new T.LatheGeometry(pts, 48), glassMat);
    g.add(body);
    // subtle highlight shell (fake specular streak)
    const shine = new T.Mesh(new T.LatheGeometry(pts, 48),
      new T.MeshBasicMaterial({ color:0xffffff, transparent:true, opacity:0.045 }));
    shine.scale.setScalar(1.004); g.add(shine);
    // cap
    const cap = new T.Mesh(new T.CylinderGeometry(o.capR,o.capR,o.capY[1]-o.capY[0],24),
      this.mat(T,o.cap,{roughness:0.35,metalness:0.3}));
    cap.position.y=(o.capY[0]+o.capY[1])/2; g.add(cap);
    // labels — a lathe that follows the exact body profile so it hugs (no float, no poke-through)
    (o.labels||[]).forEach(l=>{
      const y0=l.y[0], y1=l.y[1];
      const seg=[ new T.Vector2(this.radiusAt(profile,y0)*1.006, y0) ];
      profile.forEach(p=>{ if(p[0]>y0 && p[0]<y1) seg.push(new T.Vector2(p[1]*1.006, p[0])); });
      seg.push(new T.Vector2(this.radiusAt(profile,y1)*1.006, y1));
      const mat = this.bottleLabel(T, l);
      const lat = new T.Mesh(new T.LatheGeometry(seg, 56), mat);
      g.add(lat);
    });
    return g;
  }

  bottleLabel(T, l){
    const c=document.createElement('canvas'); c.width=512; c.height=256;
    const x=c.getContext('2d');
    const draw = ()=>{
      x.clearRect(0,0,512,256);
      x.textAlign='center'; x.textBaseline='middle';
      if(l.kind==='cola'){
        x.fillStyle='#d21f28'; x.fillRect(0,0,512,256);
        // "Koca" script, drawn first so the ribbon sweeps under it
        x.fillStyle='#f7f5f2';
        x.font='128px "Great Vibes", cursive';
        x.save(); x.translate(256,110); x.rotate(-0.04);
        x.shadowColor='rgba(0,0,0,0.25)'; x.shadowBlur=4; x.shadowOffsetY=2;
        x.fillText('Koca', 0, 0); x.restore();
        // white swept ribbon
        x.fillStyle='#f4f4f2';
        x.beginPath(); x.moveTo(0,178); x.bezierCurveTo(150,150,360,214,512,178);
        x.lineTo(512,204); x.bezierCurveTo(360,244,150,182,0,210); x.closePath(); x.fill();
        x.strokeStyle='rgba(255,255,255,0.45)'; x.lineWidth=4; x.strokeRect(8,8,496,240);
      } else if(l.kind==='fernet'){
        x.fillStyle='#e7dcc0'; x.fillRect(0,0,512,256);
        x.strokeStyle='#1f3a24'; x.lineWidth=9; x.strokeRect(12,12,488,232);
        // crest
        x.fillStyle='#16341d'; x.beginPath(); x.ellipse(256,60,44,34,0,0,Math.PI*2); x.fill();
        x.fillStyle='#c7b98f'; x.beginPath(); x.ellipse(256,60,32,24,0,0,Math.PI*2); x.fill();
        // wordmark
        x.fillStyle='#1a2f1c';
        x.font='700 52px "Playfair Display", serif';
        x.fillText('Fernet Bronca', 256, 130);
        x.font='italic 600 22px "Playfair Display", serif';
        x.fillStyle='#3a2a12'; x.fillText('LIQUEUR', 256, 166);
        x.fillStyle='#2a2113'; x.fillRect(120,192,272,6); x.fillRect(150,210,212,5); x.fillRect(170,226,172,4);
      } else { // plain cream band (neck)
        x.fillStyle=l.color||'#e7dcc0'; x.fillRect(0,0,512,256);
        x.fillStyle='#1f3a24'; x.fillRect(0,18,512,10); x.fillRect(0,228,512,10);
      }
    };
    draw();
    const tex=new T.CanvasTexture(c); tex.anisotropy=4;
    (this._labelJobs||(this._labelJobs=[])).push({ draw, tex });
    return new T.MeshStandardMaterial({ map:tex, roughness:0.55, metalness:0.0, side:T.DoubleSide });
  }

  makeLabelTexture(m){
    const T = window.THREE;
    const c = document.createElement('canvas'); c.width=320; c.height=190;
    const x = c.getContext('2d');
    const g = x.createLinearGradient(0,0,320,190); g.addColorStop(0,m.c1); g.addColorStop(1,m.c2);
    x.fillStyle=g; x.fillRect(0,0,320,190);
    x.strokeStyle='rgba(255,255,255,0.06)'; x.lineWidth=1;
    for(let i=-190;i<320;i+=16){ x.beginPath(); x.moveTo(i,0); x.lineTo(i+190,190); x.stroke(); }
    x.fillStyle='rgba(255,255,255,0.9)'; x.font='600 15px "IBM Plex Mono", monospace'; x.textBaseline='top';
    x.fillText('AULIREX', 16, 14);
    x.strokeStyle='rgba(255,255,255,0.55)'; x.lineWidth=1.4; x.strokeRect(232,12,72,24);
    x.font='600 13px "IBM Plex Mono", monospace'; x.fillText(m.code, 244, 17);
    x.fillStyle='rgba(255,255,255,0.72)'; x.font='600 11px "IBM Plex Mono", monospace'; x.fillText(m.cat, 16, 132);
    x.fillStyle='#fff'; x.font='700 30px "Space Grotesk", sans-serif'; x.fillText(m.short, 15, 148);
    const tex = new T.CanvasTexture(c); tex.anisotropy=4; return tex;
  }

  buildTapes(T){
    this.tapes = [];
    // orderly grid — fills rows left→right, growing toward the viewer (down)
    const cols = this.cols, colGap = this.colGap;
    this.modules.forEach((m,i)=>{
      const col = i % cols, row = Math.floor(i/cols);
      const inRow = Math.min(cols, this.modules.length - row*cols);
      const rowW = colGap*(inRow-1);
      const hx = -rowW/2 + col*colGap;
      const hz = this.row0Z + row*this.rowGap;
      const g = new T.Group();
      const body = new T.Mesh(new T.BoxGeometry(1.15, 0.24, 0.66), this.mat(T, 0x15171c, {roughness:0.5}));
      g.add(body);
      // colored spine strip
      const spine = new T.Mesh(new T.BoxGeometry(1.16,0.26,0.05), new T.MeshBasicMaterial({color:m.spine}));
      spine.position.set(0,0,-0.335); g.add(spine);
      // top label
      const lbl = new T.Mesh(new T.PlaneGeometry(1.02, 0.56), new T.MeshBasicMaterial({map:this.makeLabelTexture(m)}));
      lbl.rotation.x=-Math.PI/2; lbl.position.set(0,0.121,0); g.add(lbl);
      g.position.set(hx, 0.12, hz);
      g.rotation.set(0, 0, 0);
      g.traverse(o=>{ if(o.material){ o.material.transparent=true; } });
      g.userData = { idx:i, home:{ x:hx, y:0.12, z:hz, ry:0 } };
      this.tapes.push(g); this.scene.add(g);
    });
  }

  // reposition visible (matching) tapes into a compact grid; hide the rest
  applyFilter(q){
    if(!this.tapes) return;
    if(this.phase!=='idle'){ /* still store, apply when idle */ }
    const norm = (s)=> (s||'').toString().toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    const query = norm(q).trim();
    const cols = this.cols, colGap = this.colGap;
    const matches = [];
    this.modules.forEach((m,i)=>{
      const hay = norm(m.title+' '+m.short+' '+m.cat+' '+m.code+' '+m.desc);
      if(!query || hay.indexOf(query)>=0) matches.push(i);
    });
    // assign new grid slots to matches; hide non-matches
    let visRows = Math.max(1, Math.ceil(matches.length/cols));
    matches.forEach((idx,k)=>{
      const col = k % cols, row = Math.floor(k/cols);
      const inRow = Math.min(cols, matches.length - row*cols);
      const rowW = colGap*(inRow-1);
      const hx = -rowW/2 + col*colGap;
      const hz = this.row0Z + row*this.rowGap;
      const g = this.tapes[idx];
      g.visible = true;
      g.userData.home = { x:hx, y:0.12, z:hz, ry:0 };
    });
    this.tapes.forEach((g)=>{ if(matches.indexOf(g.userData.idx)<0) g.visible=false; });
    // update scroll range + camera dolly limit to the new visible row count
    this.rowsCount = visRows;
    this.extraRows = Math.max(0, visRows-1);
    this.lastRowZ = this.row0Z + (visRows-1)*this.rowGap;
    this.setState({ canScroll: this.extraRows>0 });
    this.updateSpacer();
    window.scrollTo(0,0); this.onScroll();
    this._noMatch = matches.length===0;
  }

  // ---------- interaction ----------
  ndc(e){ const r=this.canvas.getBoundingClientRect(); return { x:((e.clientX-r.left)/r.width)*2-1, y:-((e.clientY-r.top)/r.height)*2+1 }; }
  onMove(e){
    if(e.pointerType==='touch'){
      if(!this.touchTap) return;
      const dx = e.clientX - this.touchTap.x, dy = e.clientY - this.touchTap.y;
      if(Math.abs(dy) > 8 && Math.abs(dy) > Math.abs(dx)){
        this.touchTap.scrolling = true;
        this.pointer.set(-2,-2);
        this.mouseN.set(0,0);
      }
      return;
    }
    const n=this.ndc(e); this.pointer.set(n.x,n.y); this.mouseN.set(n.x,n.y);
  }
  onPointerDown(e){
    if(e.pointerType==='touch'){
      this.touchTap = { id:e.pointerId, x:e.clientX, y:e.clientY, scrolling:false };
      const n=this.ndc(e); this.pointer.set(n.x,n.y);
      return;
    }
    this.onDown(e);
  }
  onPointerUp(e){
    if(e.pointerType!=='touch') return;
    const t=this.touchTap;
    this.cancelTouchTap();
    if(!t || t.id!==e.pointerId || t.scrolling) return;
    const dx=e.clientX-t.x, dy=e.clientY-t.y;
    if(Math.hypot(dx,dy) > 12) return;
    this.onDown(e);
  }
  cancelTouchTap(){ this.touchTap=null; }
  onDown(e){
    if(this.phase!=='idle') return;
    const n=this.ndc(e); this.ray.setFromCamera(new window.THREE.Vector2(n.x,n.y), this.camera);
    const hits = this.ray.intersectObjects(this.tapes, true);
    if(hits.length){ let o=hits[0].object; while(o && o.userData.idx===undefined) o=o.parent; if(o) this.select(o.userData.idx); }
  }

  select(i){
    if(this.phase!=='idle') return;
    this.playSfx('insert');
    // si estás en una fila de abajo, la cámara sube (via scroll) siguiendo la
    // cinta hasta la lectora arriba
    try { window.scrollTo({ top: 0, behavior: 'smooth' }); } catch(e){ window.scrollTo(0,0); }
    this.selIdx=i; this.phase='inserting'; this.tc=0;
    this.setState({ selIdx:i, phase:'inserting', toast:false });
    const g = this.tapes[i];
    this.anim = { mesh:g, t0:performance.now(), dur:1200, home:g.userData.home };
    this._t1 = setTimeout(()=>{ this.phase='booting'; this.phaseStart=performance.now(); this.setState({phase:'booting'}); }, 1200);
    this._t2 = setTimeout(()=>{ this.phase='ready'; this.readyStart=performance.now(); this.setState({phase:'ready'}); }, 1200+1650);
    // once the cover has played briefly, dive into the computer automatically
    this._t3 = setTimeout(()=>{ this.enter(); }, 1200+1650+450);
  }
  skeletonWalk(){
    if(!this.walkEl || this._walking) return;
    this._walking = true;
    this.walkEl.style.animation = 'walk 16s ease-in-out';
    const done = ()=>{ this.walkEl.style.animation=''; this._walking=false; this.walkEl.removeEventListener('animationend', done); };
    this.walkEl.addEventListener('animationend', done);
  }

  eject(){
    this.playSfx('eject');
    [this._t1,this._t2,this._t3].forEach(t=>t&&clearTimeout(t));
    this.tapes.forEach(g=>{ const h=g.userData.home; g.position.set(h.x,h.y,h.z); g.rotation.set(0,h.ry,0); g.scale.set(1,1,1); g.visible=true; g.traverse(o=>{ if(o.material) o.material.opacity=1; }); });
    this.phase='idle'; this.selIdx=null; this.anim=null;
    this.setState({ phase:'idle', selIdx:null, toast:false });
  }
  // dive INTO the computer: camera plunges into the CRT, screen becomes the real page
  enter(){
    if(this.phase!=='ready') return;
    this.phase='diving';
    this.playSfx('diving');
    this.dive={ t0:performance.now(), dur:900, dir:1 };
    if(this.appEl) this.appEl.style.pointerEvents='none';
    this.setState({ phase:'diving' });
  }
  // exit the app: pull back out of the CRT, then eject the tape home
  exit(){
    if(this.phase!=='inside') return;
    this.phase='exiting';
    this.setCrt(true); // vuelven los efectos CRT durante la salida
    this.dive={ t0:performance.now(), dur:1000, dir:-1 };
    if(this.appEl) this.appEl.style.pointerEvents='none';
    this.setState({ phase:'exiting' });
  }
  // enciende/apaga los overlays de scanline/viñeta del app en pantalla
  setCrt(on){ if(!this.appEl) return; this.appEl.querySelectorAll('.crtfx').forEach(el=>{ el.style.opacity = on?'1':'0'; }); }
  finishExit(){
    // tape gets spat back out of the slot, then floats home
    const g = this.tapes[this.selIdx];
    if(g){ g.visible=true; this.setOpacity(g,1); g.scale.set(1,1,1);
      this.playSfx('eject'); // suena justo cuando la cinta salta
      this.tapeEject={ mesh:g, t0:performance.now(), dur:1150, home:g.userData.home }; }
    this.phase='idle'; this.selIdx=null;
    this.setState({ phase:'idle', selIdx:null, toast:false });
  }

  frameHeight(W){ return (typeof window!=='undefined'?window.innerHeight:760); }
  updateSpacer(){
    if(!this.spacerEl) return;
    const vh = (typeof window!=='undefined'?window.innerHeight:760);
    // one extra viewport of scroll per additional row of modules
    this.spacerH = (this.extraRows||0) * vh * 0.6;
    this.spacerEl.style.height = (vh + this.spacerH) + 'px';
  }
  onScroll(){
    if(!this.spacerH){ this.scrollT=0; return; }
    this.scrollT = Math.max(0, Math.min(1, (window.scrollY||window.pageYOffset||0)/this.spacerH));
    if(this.hintEl) this.hintEl.style.opacity = this.scrollT>0.04 ? '0' : '1';
  }

  // --- responsive: columnas de casetes, cámara y visibilidad del decor ---
  colsForWidth(w){ return w < 430 ? 1 : (w < 768 ? 2 : 4); }

  applyCameraForViewport(){
    const T = window.THREE, mob = this.isMobile;
    this.camera.fov = mob ? 52 : 42; this.camera.updateProjectionMatrix();
    this.camTop = mob
      ? { pos:new T.Vector3(0, 5.0, 6.4),  look:new T.Vector3(0, 1.35, -0.35) }
      : { pos:new T.Vector3(0, 4.45, 5.55), look:new T.Vector3(0, 1.78, 0.45) };
    this.camBot = mob
      ? { pos:new T.Vector3(0, 3.7, this.lastRowZ+3.6), look:new T.Vector3(0, 0.0, this.lastRowZ-0.1) }
      : { pos:new T.Vector3(0, 3.5, this.lastRowZ+3.0), look:new T.Vector3(0, 0.0, this.lastRowZ-0.1) };
  }

  applyDecorVisibility(){
    const off = this.isMobile;
    if(this.decorGroup) this.decorGroup.visible = !off;
    if(this.skeleton)   this.skeleton.visible   = !off;
    if(this.skelLight)  this.skelLight.visible   = !off;
    if(this.walkEl)     this.walkEl.style.display = off ? 'none' : '';
  }

  updateTouchAction(){
    const action = this.isMobile ? 'pan-y' : 'none';
    if(this.mount) this.mount.style.touchAction = action;
    if(this.canvas) this.canvas.style.touchAction = action;
  }

  resize(){
    if(!this.renderer) return;
    const W=this.mount.clientWidth||900, H=this.frameHeight(W);
    this.renderer.setSize(W,H); this.camera.aspect=W/H; this.camera.updateProjectionMatrix();
    const wasMobile = this.isMobile, prevCols = this.cols;
    this.isMobile = W < 768; this.cols = this.colsForWidth(W);
    this.updateTouchAction();
    this.rowGap = this.isMobile ? 1.15 : 1.25;
    if(this.cols !== prevCols) this.applyFilter(this.state.query||''); // re-grilla (actualiza lastRowZ/spacer)
    this.applyCameraForViewport();
    if(this.isMobile !== wasMobile) this.applyDecorVisibility();
    this.updateSpacer(); this.onScroll();
  }

  // ---------- animation ----------
  lerp(a,b,t){ return a+(b-a)*t; }
  setOpacity(g,o){ g.traverse(x=>{ if(x.material) x.material.opacity=o; }); }

  animate(){
    this._raf = requestAnimationFrame(()=>this.animate());
    const now = performance.now();

    // camera: dive into the CRT during diving/exiting, else parallax
    if(this.dive){
      const d=this.dive, p=Math.min(1,(now-d.t0)/d.dur);
      const e = p<0.5 ? 2*p*p : 1-Math.pow(-2*p+2,2)/2;   // easeInOut
      const prog = d.dir>0 ? e : 1-e;                       // 0=outside … 1=inside
      const near = this._diveNear || (this._diveNear={x:0,y:1.32,z:-0.47});
      this.camera.position.set(
        this.lerp(this.camBase.x, near.x, prog),
        this.lerp(this.camBase.y, near.y, prog),
        this.lerp(this.camBase.z, near.z, prog));
      this.camera.lookAt(0, this.lerp(this.camLook.y,1.32,prog), this.lerp(this.camLook.z,-0.985,prog));
      if(this.appEl){
        // fade the app in across the WHOLE plunge so the blue screen never cuts to black
        const o = d.dir>0 ? Math.min(1, prog/0.6) : Math.max(0,(prog-0.25)/0.55);
        this.appEl.style.opacity = o.toFixed(3);
        this.appEl.style.pointerEvents = o>0.9 ? 'auto' : 'none';
      }
      if(p>=1){
        if(d.dir>0){ this.phase='inside'; if(this.appEl){this.appEl.style.opacity='1';this.appEl.style.pointerEvents='auto';} this.setCrt(false); this.setState({phase:'inside'}); }
        else { if(this.appEl){this.appEl.style.opacity='0';} this.finishExit(); }
        this.dive=null;
      }
    } else if(this.phase==='inside'){
      if(this.appEl){ this.appEl.style.opacity='1'; this.appEl.style.pointerEvents='auto'; }
    } else if(this.camBase){
      // scroll-dolly: interpola de la vista de arriba (monitor + 1ª fila) a camBot,
      // que baja y adelanta la cámara para enfocar de lleno la última fila.
      const st = this.scrollT||0;
      this.camBase.set(
        this.lerp(this.camTop.pos.x, this.camBot.pos.x, st),
        this.lerp(this.camTop.pos.y, this.camBot.pos.y, st),
        this.lerp(this.camTop.pos.z, this.camBot.pos.z, st));
      this.camLook.set(
        this.lerp(this.camTop.look.x, this.camBot.look.x, st),
        this.lerp(this.camTop.look.y, this.camBot.look.y, st),
        this.lerp(this.camTop.look.z, this.camBot.look.z, st));
      const tx = this.camBase.x + this.mouseN.x*0.5;
      const ty = this.camBase.y - this.mouseN.y*0.35;
      this.camera.position.x += (tx-this.camera.position.x)*0.12;
      this.camera.position.y += (ty-this.camera.position.y)*0.12;
      this.camera.position.z += (this.camBase.z-this.camera.position.z)*0.14;
      this.camera.lookAt(this.camLook);
    }

    // tape eject tween — pops out of the slot, then glides back to its home
    if(this.tapeEject){
      const a=this.tapeEject, p=Math.min(1,(now-a.t0)/a.dur), g=a.mesh, h=a.home;
      const inZ=-1.12, popY=0.5, popZ=-0.12;   // sale DERECHO desde el centro (x=0) hacia el frente
      g.rotation.set(0,0,0);
      if(p<0.5){
        const q=p/0.5, e=1-(1-q)*(1-q);        // salta al frente, centrado en la lectora
        g.position.set(0, this.lerp(0.42,popY,e), this.lerp(inZ,popZ,e));
        g.scale.setScalar(this.lerp(0.9,1,e)); this.setOpacity(g,1);
        this.slotGlow.material.opacity = Math.sin(q*Math.PI)*0.7;
      } else {
        const q=(p-0.5)/0.5, e=q<0.5?2*q*q:1-Math.pow(-2*q+2,2)/2;  // recién ahí se acomoda al estante
        g.position.set(this.lerp(0,h.x,e), this.lerp(popY,h.y,e), this.lerp(popZ,h.z,e));
        g.rotation.y = this.lerp(0,h.ry,e); g.scale.setScalar(1);
      }
      if(p>=1){ g.position.set(h.x,h.y,h.z); g.rotation.set(0,h.ry,0); this.slotGlow.material.opacity=0; this.tapeEject=null; }
    }

    // hover: float + tilt toward mouse (idle); settle back otherwise
    const t = now/1000;
    if(this.phase==='idle' && this.tapes){
      this.ray.setFromCamera(this.pointer, this.camera);
      const hits = this.ray.intersectObjects(this.tapes, true);
      let hg=null; if(hits.length){ let o=hits[0].object; while(o && o.userData.idx===undefined) o=o.parent; hg=o; }
      this.canvas.style.cursor = hg ? 'pointer' : 'default';
      this.tapes.forEach((g,i)=>{
        if(this.tapeEject && g===this.tapeEject.mesh) return; // no tironear la cinta que se eyecta
        const h=g.userData.home, hov=(g===hg);
        const ty = h.y + (hov?0.22:0) + Math.sin(t*1.3+i)*0.006;
        g.position.x += (h.x - g.position.x)*0.14;
        g.position.z += (h.z - g.position.z)*0.14;
        g.position.y += (ty - g.position.y)*0.14;
        const rxT = hov ? -this.mouseN.y*0.22 : 0;
        const rzT = hov ?  this.mouseN.x*0.22 : 0;
        const ryT = h.ry + (hov ? this.mouseN.x*0.16 : 0);
        g.rotation.x += (rxT - g.rotation.x)*0.14;
        g.rotation.z += (rzT - g.rotation.z)*0.14;
        g.rotation.y += (ryT - g.rotation.y)*0.14;
      });
    } else if(this.tapes){
      if(this.canvas) this.canvas.style.cursor='default';
      this.tapes.forEach(g=>{
        if(!g.visible || (this.anim && g===this.anim.mesh)) return;
        const h=g.userData.home;
        g.position.x += (h.x - g.position.x)*0.14;
        g.position.z += (h.z - g.position.z)*0.14;
        g.position.y += (h.y - g.position.y)*0.14;
        g.rotation.x += (0 - g.rotation.x)*0.14;
        g.rotation.z += (0 - g.rotation.z)*0.14;
        g.rotation.y += (h.ry - g.rotation.y)*0.14;
      });
    }

    // insert tween — tape stays FLAT (label up) and slides into the slot
    if(this.anim){
      const p = Math.min(1,(now-this.anim.t0)/this.anim.dur);
      const g = this.anim.mesh, hm = this.anim.home;
      const mouthY = 0.44, mouthZ = -0.66, inZ = -1.18;
      g.rotation.set(0, 0, 0);
      if(p<0.5){
        // rise off the desk and glide in front of the slot mouth, level
        const q = p/0.5, e = 1-(1-q)*(1-q);
        g.position.set(this.lerp(hm.x,0,e), this.lerp(hm.y,mouthY,e), this.lerp(hm.z,mouthZ,e));
        g.scale.setScalar(1); this.setOpacity(g,1);
      } else {
        // push straight forward into the machine; fade as it disappears inside
        const q = (p-0.5)/0.5, e = q*q;
        g.position.set(0, mouthY, this.lerp(mouthZ,inZ,e));
        const s = this.lerp(1,0.9,q); g.scale.set(s,1,s);
        this.setOpacity(g, q<0.55 ? 1 : 1-(q-0.55)/0.45);
        this.slotGlow.material.opacity = Math.sin(q*Math.PI)*0.9;
      }
      if(p>=1){ g.visible=false; this.anim=null; this.slotGlow.material.opacity=0; }
    }

    // skeleton body (DOM image) tilts toward the mouse in perspective — creepy watch
    // throttled to ~30fps and only written when it actually changes (avoids layout thrash / lag)
    if(this.headEl && now-(this._hlast||0) > 33){
      this._hlast = now;
      const tx = (this.hx||0), ty = (this.hy||0);
      this._hrx = (this._hrx||0) + (( -ty*3 ) - (this._hrx||0))*0.08;
      this._hry = (this._hry||0) + (( tx*7 ) - (this._hry||0))*0.08;
      const bob = Math.sin(now/1400)*4;
      const rx=this._hrx.toFixed(2), ry=this._hry.toFixed(2), b=bob.toFixed(1);
      const s = 'perspective(1100px) translateY('+b+'px) rotateX('+rx+'deg) rotateY('+ry+'deg)';
      if(s!==this._hprev){ this.headEl.style.transform = s; this._hprev=s; }
    }

    // screen + led + glow
    this.drawScreen(now);
    const on = this.phase!=='idle';
    this.led.material.color.setHex(on?0x4a93ff:0x3a4150);
    this.screenLight.intensity = this.phase==='ready'?1.3:(on?0.7:0.55);

    this.renderer.render(this.scene, this.camera);
  }

  // ---------- screen canvas ----------
  drawScreen(now){
    const x=this.sctx, W=640, H=480, ph=this.phase;
    const bg=x.createRadialGradient(320,40,40,320,240,520); bg.addColorStop(0,'#0d2140'); bg.addColorStop(0.55,'#081525'); bg.addColorStop(1,'#050b16');
    x.fillStyle=bg; x.fillRect(0,0,W,H);

    if(ph==='idle'||ph==='inserting'){
      x.globalAlpha = ph==='inserting'?0.45:1;
      // AULIREX isotype
      if(this.markImg && this.markImg.complete){
        const s=140; x.drawImage(this.markImg, 320-s/2, 40, s, s);
      }
      x.textAlign='center'; x.fillStyle='#8fbcff'; x.font='600 24px "IBM Plex Mono", monospace'; x.fillText('AULIREX OS v3.2', 320, 250);
      x.fillStyle='#5f88c4'; x.font='500 19px "IBM Plex Mono", monospace'; x.fillText('SIN SEÑAL · NO SIGNAL', 320, 300);
      const cur = Math.floor(now/500)%2 ? '_' : ' ';
      x.fillText('▸ INSERTÁ UN CASSETTE '+cur, 320, 336);
      x.globalAlpha=1; x.textAlign='left';
    } else if(ph==='booting'){
      const e=(now-this.phaseStart)/1000; const m=this.modules[this.selIdx];
      x.fillStyle='#7fd0ff'; x.font='500 20px "IBM Plex Mono", monospace'; x.textBaseline='top';
      const lines=[[0,'AULIREX OS v3.2 — INIT'],[0.25,'> MOUNT /vhs/módulo'],[0.55,'> CHECKSUM ......... OK'],[0.85,'> CARGANDO: '+m.short],[1.1,'> DECODING VHS SIGNAL']];
      let yy=44; lines.forEach(l=>{ if(e>l[0]){ x.fillStyle = l[1].indexOf('OK')>=0?'#7fd0ff':'#7fd0ff'; x.fillText(l[1], 40, yy);} yy+=34; });
      if(e>1.2){ const bw=380, prog=Math.min(1,(e-1.2)/1.0); x.strokeStyle='#2f6db0'; x.lineWidth=2; x.strokeRect(40,yy+6,bw,20); x.fillStyle='#3f8bff'; x.fillRect(43,yy+9,(bw-6)*prog,14); }
      if(e>1.35){ const cur=Math.floor(now/500)%2?'_':' '; x.fillStyle='#9fc2ff'; x.fillText('LISTO. ▸ REPRODUCIENDO'+cur, 40, yy+44); }
      x.textBaseline='alphabetic';
    } else if(ph==='ready'){
      const m=this.modules[this.selIdx];
      const g=x.createLinearGradient(0,0,W,H); g.addColorStop(0,m.c1); g.addColorStop(1,m.c2);
      x.fillStyle=g; x.fillRect(0,0,W,H);
      x.strokeStyle='rgba(255,255,255,0.05)'; x.lineWidth=2;
      for(let i=-480;i<W;i+=34){ x.beginPath(); x.moveTo(i,0); x.lineTo(i+220,H); x.stroke(); }
      // blue tint
      x.fillStyle='rgba(20,60,150,0.22)'; x.fillRect(0,0,W,H);
      // top gradient band
      const tb=x.createLinearGradient(0,0,0,130); tb.addColorStop(0,'rgba(0,0,0,0.45)'); tb.addColorStop(1,'rgba(0,0,0,0)'); x.fillStyle=tb; x.fillRect(0,0,W,130);
      // bottom band + title
      const bbY=300; const bb=x.createLinearGradient(0,bbY,0,H); bb.addColorStop(0,'rgba(0,0,0,0)'); bb.addColorStop(1,'rgba(0,0,0,0.72)'); x.fillStyle=bb; x.fillRect(0,bbY,W,H-bbY);
      x.fillStyle='rgba(255,255,255,0.75)'; x.font='500 15px "IBM Plex Mono", monospace'; x.fillText(m.cat, 34, 372);
      x.fillStyle='#fff'; x.font='700 42px "Space Grotesk", sans-serif'; x.fillText(m.title, 32, 418);
      x.fillStyle='rgba(255,255,255,0.85)'; x.font='500 18px "Space Grotesk", sans-serif'; x.fillText(m.desc, 34, 448);
      // AULIREX VHS + code
      x.fillStyle='rgba(255,255,255,0.85)'; x.font='600 15px "IBM Plex Mono", monospace'; x.fillText('AULIREX VHS', 34, 30);
      x.strokeStyle='rgba(255,255,255,0.45)'; x.lineWidth=1.5; x.strokeRect(W-104,20,74,26); x.fillText(m.code, W-94, 30);
      // PLAY + REC + timecode
      const cur=Math.floor(now/450)%2;
      x.fillStyle='#fff'; x.font='600 16px "IBM Plex Mono", monospace'; x.fillText((cur?'▶':'  ')+' PLAY', 34, 70);
      const tc=Math.floor((now-this.readyStart)/1000); const mm=String(Math.floor(tc/60)).padStart(2,'0'), ss=String(tc%60).padStart(2,'0');
      if(cur){ x.fillStyle='#ff4d4d'; x.beginPath(); x.arc(W-150,76,7,0,Math.PI*2); x.fill(); }
      x.fillStyle='#fff'; x.fillText('REC '+mm+':'+ss, W-134, 70);
      // tracking line
      const ty=((now/22)%(H+40))-20; x.fillStyle='rgba(255,255,255,0.28)'; x.fillRect(0,ty,W,7);
    }

    // scanlines + vignette (all states)
    x.fillStyle='rgba(0,0,0,0.14)'; for(let y=0;y<H;y+=3){ x.fillRect(0,y,W,1); }
    const vg=x.createRadialGradient(320,240,180,320,240,420); vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,10,30,0.55)'); x.fillStyle=vg; x.fillRect(0,0,W,H);
    this.screenTex.needsUpdate=true;
  }

  renderVals(){
    const { phase, selIdx } = this.state;
    const sel = selIdx!=null ? this.modules[selIdx] : this.modules[0];
    return {
      isIdle: phase==='idle',
      isBusy: phase==='inserting'||phase==='booting'||phase==='ready',
      isReady: phase==='ready',
      // 'booting'/'ready' montan la pantalla (invisible, opacity:0) para PRECARGAR
      // el iframe del módulo → al bucear ya está listo, sin pantalla en negro.
      showApp: phase==='booting'||phase==='ready'||phase==='diving'||phase==='inside'||phase==='exiting',
      showToast: this.state.toast,
      selShort: sel.short, selTitle: sel.title,
      selDesc: sel.desc, selCat: sel.cat, selCode: sel.code, appAccent: sel.c1,
      selAvailable: sel.available===true, selComingSoon: sel.available!==true,
      frameRef: (el)=>{ this.frameEl=el; if(el){ const m=this.modules[this.state.selIdx!=null?this.state.selIdx:0]; if(m&&m.available){ const want='/#/'+m.slug; if(el.getAttribute('src')!==want){ el.setAttribute('src', want); } } } },
      eject: ()=> this.eject(),
      enter: ()=> this.enter(),
      exit: ()=> this.exit(),
      rootRef: (el)=>{ this.root=el; },
      mountRef: (el)=>{ this.mount=el; },
      appRef: (el)=>{ this.appEl=el; },
      skelRef: (el)=>{ this.skelEl=el; },
      headRef: (el)=>{ this.headEl=el; },
      walkRef: (el)=>{ this.walkEl=el; },
      stageRef: (el)=>{ this.stageEl=el; },
      spacerRef: (el)=>{ this.spacerEl=el; this.updateSpacer&&this.updateSpacer(); },
      hintRef: (el)=>{ this.hintEl=el; },
      canScroll: this.state.canScroll,
      query: this.state.query,
      hasQuery: !!this.state.query,
      onSearch: (e)=>{ this.setState({ query:e.target.value }); this.applyFilter(e.target.value); },
      clearSearch: ()=>{ this.setState({ query:'' }); this.applyFilter(''); }
    };
  }
}
</script>
